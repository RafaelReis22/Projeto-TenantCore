name: TenantCore Pipeline (CI/CD)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: multi_tenant_db
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Install OPA
      uses: open-policy-agent/setup-opa@v2
      with:
        version: latest

    - name: Run OPA Policy Tests
      run: opa test ./opa -v

    - name: Build and Test TenantCore
      run: mvn -f tenantcore/pom.xml clean install -DskipTests

    - name: Build and Test Product Service
      run: mvn -f services/product-service/pom.xml clean install -DskipTests

    - name: Docker Build Check (TenantCore)
      run: docker build ./tenantcore -t tenantcore:latest

    - name: Docker Build Check (Product Service)
      run: docker build ./services/product-service -t tenantcore-product:latest

    - name: Final Integrity Check
      run: echo "🎉 Build e Validação de Segurança Concluídos com Sucesso!"
